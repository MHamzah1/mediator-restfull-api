version: '3.8'

# ============================================
# Production Configuration
# Menggunakan Neon.tech (External PostgreSQL)
# ============================================

services:
  # ============================================
  # NestJS API Application
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediator-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - '${PORT:-3000}:3000'
    # ✅ Mount uploads folder untuk persist files
    volumes:
      - ./uploads:/app/uploads
    networks:
      - mediator-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ============================================
# Networks
# ============================================
networks:
  mediator-network:
    driver: bridge
