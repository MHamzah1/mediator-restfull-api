version: '3.8'

# ============================================
# Development Configuration
# Mode 1: Local PostgreSQL (default)
# Mode 2: Neon.tech (gunakan .env dengan DATABASE_URL dari Neon)
# ============================================

services:
  # ============================================
  # PostgreSQL Database (Local)
  # Uncomment jika ingin pakai database lokal
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: mediator-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediator
      POSTGRES_PASSWORD: mediator123
      POSTGRES_DB: mediator_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - mediator-network-dev
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mediator -d mediator_db']
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - local-db

  # ============================================
  # NestJS API (Development Mode with Hot Reload)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mediator-api-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 8080
    volumes:
      - .:/app
      - /app/node_modules
      # ✅ Mount uploads folder untuk persist files
      - ./uploads:/app/uploads
    ports:
      - '${PORT:-8080}:8080'
    networks:
      - mediator-network-dev
    command: npm run start:dev

  # ============================================
  # NestJS API dengan Local PostgreSQL
  # ============================================
  api-local:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mediator-api-local
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://mediator:mediator123@postgres:5432/mediator_db
      JWT_SECRET: dev-local-secret-key
      JWT_EXPIRE_IN: 1d
    volumes:
      - .:/app
      - /app/node_modules
      # ✅ Mount uploads folder untuk persist files
      - ./uploads:/app/uploads
    ports:
      - '8080:8080'
    networks:
      - mediator-network-dev
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev
    profiles:
      - local-db

  # ============================================
  # pgAdmin (Database Management GUI)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mediator-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mediator.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    networks:
      - mediator-network-dev
    profiles:
      - local-db

# ============================================
# Networks
# ============================================
networks:
  mediator-network-dev:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data_dev:
    driver: local
